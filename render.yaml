services:
  - type: web
    name: fc-matchhub
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_BASE_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: fc-matchhub-db
          property: connectionString
      - key: EMAIL_FROM
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EA_API_MODE
        value: live
      - key: EA_PRO_CLUBS_API_URL
        sync: false
      - key: ALLOW_DEV_VERIFY_LINK
        value: "false"
      - key: ALLOW_MOCK_PAYMENTS
        value: "false"
      - key: ADMIN_ACCESS_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_CLIENT_SECRET
        sync: false
      - key: COINBASE_COMMERCE_API_KEY
        sync: false

databases:
  - name: fc-matchhub-db
    plan: free
